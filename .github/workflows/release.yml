name: Release — Build, Test & Publish

on:
  push:
    branches: [main, master]

permissions:
  contents: write

jobs:
  release:
    name: Build, Test & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Read version from package.json
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Zip distributable
        run: zip -r resonance-dist.zip dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.pkg.outputs.version }}-build.${{ github.run_number }}
          name: Resonance v${{ steps.pkg.outputs.version }} (Build ${{ github.run_number }})
          body: |
            ## Resonance — Automated Release

            **Commit:** ${{ github.sha }}
            **Branch:** ${{ github.ref_name }}

            ### How to play
            1. Download **resonance-dist.zip** below and extract it.
            2. Open `index.html` in any modern browser — no server required.

            ### Controls
            | Action | Input |
            |--------|-------|
            | Rotate left | `←` / `A` · left half of screen |
            | Rotate right | `→` / `D` · right half of screen |
            | Start / Restart | `Space` / `Enter` · tap/click |
          files: resonance-dist.zip
          fail_on_unmatched_files: true
